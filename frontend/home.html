<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportslink Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"
        defer></script>
</head>

<body>


    <!-- Navbar with nav links -->
    <nav class="navbar navbar-expand-lg px-3 py-2 sl-navbar">
        <a class="navbar-brand fw-bold text-white d-flex align-items-center" href="#">
            <img src="images/white-maple-leaf.png" alt="maple leaf" class="sl-logo">
            Sportslink
        </a>


        <!-- nav links with boostrap icons -->
        <ul class="navbar-nav ms-auto d-flex flex-row gap-2">
            <li class="nav-item">
                <a class="nav-link text-white current" href="#" title="Home">
                    <i class="bi bi-house-fill fs-5"></i>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white" href="#" title="Messages">
                    <i class="bi bi-chat-fill fs-5"></i>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white" href="#" title="Notifications">
                    <i class="bi bi-bell-fill fs-5"></i>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white" href="#" title="Profile">
                    <i class="bi bi-person-circle fs-5"></i>
                </a>
            </li>
        </ul>
    </nav>



    <div class="container-fluid px-3 py-3">
        <div class="row g-3">

            <!-- Left sidebar -->
            <div class="col-lg-3">
                <div class="card shadow-sm">
                    <div class="card-header sl-card-banner"></div>
                    <div class="card-body text-center">
                        <div class="sl-avatar mx-auto mb-2">BS</div>
                        <h6 class="fw-bold mb-1">Brendan Stevenson</h6>
                        <p class="text-muted small mb-2">Forward • Hockey • Regina</p>
                        <div class="d-flex justify-content-around border-top pt-2">
                            <div>
                                <div class="fw-bold">142</div>
                                <div class="text-muted sl-follow-label">Followers</div>
                            </div>
                            <div>
                                <div class="fw-bold">89</div>
                                <div class="text-muted sl-follow-label">Following</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Middle feed -->
            <div class="col-lg-6 text-center" style="background:lightgreen;">
                Main Feed
            </div>

            <!-- Right sidebar -->
            <div class="col-lg-3 text-center" style="background:lightcoral;">
                Right Sidebar
            </div>
        </div>
    </div>


</body>

</html>
